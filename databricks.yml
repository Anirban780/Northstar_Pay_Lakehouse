# NorthStar Pay — Lakehouse Pipeline Bundle
# Separate Datagen and Lakehouse pipelines

bundle:
  name: northstar_pay_pipeline


# 1. Root-level variable declarations (Required for schema validation)
variables:
  catalog:
    description: "Target Unity Catalog"
  schema:
    description: "Target Schema"
  volume:
    description: "Target Volume for raw landing files"
  num_customers:
    description: "Number of customers to generate"
  num_merchants:
    description: "Number of merchants to generate"
  num_transactions:
    description: "Number of transactions to generate"
  num_devices_events:
    description: "Number of device events to generate"
  random_seed:
    description: "Random seed for reproducibility"
  months_of_history:
    default: "3"
  fraud_rate:
    default: "0.02"

# 2. Separate Orchestrated Workflows
resources:
  jobs:
    # JOB 1: Handles Mock Data Generation Only
    datagen_job:
      name: "[${bundle.target}] northstar_pay_datagen"
      tasks:
        - task_key: generate_dimensions
          notebook_task:
            notebook_path: ./datagen/01_config_and_dimensions.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              volume: ${var.volume}
              num_customers: ${var.num_customers}
              num_merchants: ${var.num_merchants}
              random_seed: ${var.random_seed}
        - task_key: generate_transactions
          depends_on:
            - task_key: generate_dimensions
          notebook_task:
            notebook_path: ./datagen/02_generate_transactions.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              volume: ${var.volume}
              num_transactions: ${var.num_transactions}
              months_of_history: ${var.months_of_history}
              fraud_rate: ${var.fraud_rate}
              random_seed: ${var.random_seed}
        - task_key: generate_device_logs
          depends_on:
            - task_key: generate_dimensions
          notebook_task:
            notebook_path: ./datagen/03_generate_device_session_logs.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              volume: ${var.volume}
              num_events: ${var.num_devices_events}
              months_of_history: ${var.months_of_history}
              random_seed: ${var.random_seed}

    # JOB 2: Handles Lakehouse Ingestion Separately
    bronze_job:
      name: "[${bundle.target}] northstar_pay_bronze"
      tasks:
        - task_key: run_bronze_pipeline
          notebook_task:
            notebook_path: ./resources/notebooks/bronze_pipeline.py
            base_parameters:
              catalog: ${var.catalog}
              env: ${bundle.target}

# 3. Environment Targets
targets:
  dev:
    mode: development
    workspace:
      host: https://adb-7405610008164608.8.azuredatabricks.net
    variables:
      catalog: northstar_dev
      schema: raw
      volume: landing
      num_customers: "50000"
      num_merchants: "9000"
      num_transactions: "820000"
      num_devices_events: "260000"
      random_seed: "42"
    run_as:
      user_name: anir.cloud01@gmail.com

  staging:
    mode: production
    workspace:
      host: https://adb-7405610008164608.8.azuredatabricks.net
    variables:
      catalog: northstar_staging
      schema: raw
      volume: landing
      num_customers: "50000"
      num_merchants: "9000"
      num_transactions: "820000"
      num_devices_events: "260000"
      random_seed: "42"
    permissions:
      - level: CAN_VIEW
        group_name: data-team

  prod:
    mode: production
    workspace:
      host: https://adb-7405610008164608.8.azuredatabricks.net
    variables:
      catalog: northstar_prod
      schema: raw
      volume: landing
      num_customers: "90000"
      num_merchants: "10000"
